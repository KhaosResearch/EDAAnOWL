<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900px" version="1.1" width="1000px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><style type="text/css"><![CDATA[
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        text { font-family: 'Inter', sans-serif; fill: #2d3436; }
        .layer-bg { rx: 15; ry: 15; stroke-width: 2; }
        .component-box { rx: 6; ry: 6; stroke-width: 1.5; fill: #ffffff; }
        
        .label-title { font-size: 20px; font-weight: 600; text-anchor: middle; fill: #2d3436; text-transform: uppercase; letter-spacing: 1.5px; }
        .label-header { font-size: 15px; font-weight: 600; text-anchor: middle; }
        .label-text { font-size: 13px; text-anchor: middle; fill: #2d3436; }
        .label-italic { font-size: 11px; font-style: italic; text-anchor: middle; fill: #636e72; }
        
        /* High Contrast Palette (Light Bases) */
        .color-ds { fill: #e3f2fd; stroke: #1565c0; }      /* Blue */
        .color-cred { fill: #f3e5f5; stroke: #7b1fa2; }    /* Purple */
        .color-edaan { fill: #e8f5e9; stroke: #2e7d32; }   /* Green */
        .color-idsa { fill: #fce4ec; stroke: #c2185b; }    /* Red */
        .color-bigowl { fill: #fffde7; stroke: #fbc02d; }  /* Yellow/Orange */
        
        /* Clear Solid Arrow Lines */
        .arrow-line { stroke: #535c68; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
        .arrow-dashed { stroke-dasharray: 8,6; }
        .arrow-text { font-size: 12px; font-weight: 600; fill: #535c68; text-anchor: middle; }
        
        .bg-canvas { fill: #ffffff; }
    ]]></style><marker id="arrowhead" markerHeight="10" markerUnits="strokeWidth" markerWidth="10" orient="auto" refX="9" refY="5"><path d="M0,0 L10,5 L0,10 Z" fill="#535c68" /></marker></defs><rect class="bg-canvas" height="100%" width="100%" x="0" y="0" /><rect class="layer-bg color-ds" height="120" width="900" x="50" y="40" /><text class="label-title" x="500" y="70">Data Space (Physical Assets)</text><rect class="component-box color-ds" height="45" width="250" x="120" y="95" /><text class="label-header" x="245" y="122">Data Assets &amp; Files</text><rect class="component-box color-ds" height="45" width="250" x="630" y="95" /><text class="label-header" x="755" y="122">Algorithms &amp; Apps</text><rect class="layer-bg" fill="#fcfcfc" height="500" stroke="#b2bec3" width="900" x="50" y="220" /><text class="label-title" x="500" y="245">Semantic Interoperability (Ontology)</text><rect class="layer-bg color-cred" height="260" width="220" x="70" y="280" /><text class="label-header" x="180" y="305">CRED / DCAT-AP</text><rect class="component-box color-cred" height="32" width="180" x="90" y="330" /><text class="label-text" x="180" y="351">dcat:Catalog</text><rect class="component-box color-cred" height="32" width="180" x="90" y="370" /><text class="label-text" x="180" y="391">dcat:Dataset</text><rect class="component-box color-cred" height="32" width="180" x="90" y="410" /><text class="label-text" x="180" y="431">dcat:DataService</text><rect class="component-box color-cred" height="32" width="180" x="90" y="450" /><text class="label-text" x="180" y="471">odrl:Offer / Policy</text><rect class="component-box color-cred" height="32" width="180" x="90" y="490" /><text class="label-text" x="180" y="511">foaf:Agent</text><rect class="layer-bg color-idsa" height="130" width="220" x="710" y="280" /><text class="label-header" x="820" y="305">IDSA Standards</text><rect class="component-box color-idsa" height="35" width="180" x="730" y="325" /><text class="label-text" x="820" y="348">ids:DataResource</text><rect class="component-box color-idsa" height="35" width="180" x="730" y="370" /><text class="label-text" x="820" y="393">ids:DataApp</text><rect class="layer-bg color-edaan" height="420" width="360" x="320" y="280" /><text class="label-header" x="500" y="305">EDAAnOWL v1.0.0 Core</text><rect class="component-box color-edaan" height="50" width="150" x="340" y="325" /><text class="label-header" x="415" y="348">DataAsset</text><text class="label-italic" x="415" y="365">(Supply)</text><rect class="component-box color-edaan" height="50" width="150" x="510" y="325" /><text class="label-header" x="585" y="348">SmartDataApp</text><text class="label-italic" x="585" y="365">(Demand)</text><rect class="layer-bg" fill="#f1f8f1" height="170" stroke="#2e7d32" style="stroke-dasharray: 4,4;" width="320" x="340" y="405" /><text class="label-italic" x="500" y="425">MATCHMAKING BRIDGE</text><rect class="component-box color-edaan" height="35" width="280" x="360" y="440" /><text class="label-header" x="500" y="463">DataSpecification (Meaning)</text><rect class="component-box color-edaan" height="35" width="130" x="360" y="490" /><text class="label-text" x="425" y="513">FieldMapping</text><rect class="component-box color-edaan" height="35" width="130" x="360" y="530" /><text class="label-text" x="425" y="553">Metric / Unit</text><rect class="component-box color-edaan" height="35" width="130" x="510" y="490" /><text class="label-text" x="575" y="513">InputProfile</text><rect class="component-box color-edaan" height="35" width="130" x="510" y="530" /><text class="label-text" x="575" y="553">DataConstraint</text><rect class="component-box color-edaan" height="80" style="stroke-dasharray: 2,2;" width="320" x="340" y="600" /><text class="label-header" x="500" y="625">SOSA Semantic Anchor</text><text class="label-text" x="500" y="650">Property / FOI / Unit URI</text><rect class="layer-bg color-bigowl" height="140" width="220" x="710" y="600" /><text class="label-header" x="820" y="625">BIGOWL Workflows</text><rect class="component-box color-bigowl" height="32" width="180" x="730" y="650" /><text class="label-text" x="820" y="671">bigwf:Workflow</text><rect class="component-box color-bigowl" height="32" width="180" x="730" y="690" /><text class="label-text" x="820" y="711">bigwf:Component</text><line class="arrow-line" x1="245" x2="245" y1="140" y2="280" /><text class="arrow-text" x="245" y="200">Describe</text><line class="arrow-line" x1="755" x2="755" y1="140" y2="280" /><text class="arrow-text" x="755" y="200">Describe</text><line class="arrow-line" x1="415" x2="415" y1="375" y2="485" /><text class="arrow-text" x="375" y="435">mapped</text><line class="arrow-line" x1="585" x2="585" y1="375" y2="485" /><text class="arrow-text" x="625" y="435">requires</text><line class="arrow-line" x1="425" x2="485" y1="485" y2="440" /><line class="arrow-line" x1="575" x2="515" y1="485" y2="440" /><line class="arrow-line arrow-dashed" x1="500" x2="500" y1="440" y2="600" /><line class="arrow-line arrow-dashed" x1="290" x2="340" y1="350" y2="350" /><line class="arrow-line" x1="710" x2="490" y1="350" y2="350" /><line class="arrow-line" x1="660" x2="730" y1="390" y2="390" /><line class="arrow-line" x1="820" x2="820" y1="410" y2="600" /></svg>