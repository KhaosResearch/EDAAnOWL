    ]]></style><marker id="arrowhead" markerHeight="5" markerWidth="5" orient="auto" refX="10" refY="5"><path d="M0,0 L10,5 L0,10 Z" fill="#636e72" /></marker></defs><rect class="layer-bg color-ds" height="100" width="900" x="50" y="40" /><text class="label-title" x="500" y="70">DATA SPACE LAYER (Physical Domain)</text><rect class="component-box color-ds" height="40" width="220" x="120" y="85" /><text class="label-header" x="230" y="110">Data Assets &amp; Distributions</text><rect class="component-box color-ds" height="40" width="220" x="660" y="85" /><text class="label-header" x="770" y="110">Data Apps &amp; Services</text><rect class="layer-bg" fill="#fdfdfd" height="520" stroke="#b2bec3" width="900" x="50" y="170" /><text class="label-title" x="500" y="195">SEMANTIC INTEROPERABILITY LAYER</text><rect class="layer-bg color-cred" height="240" width="220" x="70" y="230" /><text class="label-header" x="180" y="255">CRED / DCAT-AP 3.0</text><rect class="component-box color-cred" height="30" width="180" x="90" y="275" /><text class="label-text" x="180" y="295">dcat:Catalog</text><rect class="component-box color-cred" height="30" width="180" x="90" y="315" /><text class="label-text" x="180" y="335">dcat:Dataset</text><rect class="component-box color-cred" height="30" width="180" x="90" y="355" /><text class="label-text" x="180" y="375">dcat:DataService</text><rect class="component-box color-cred" height="30" width="180" x="90" y="395" /><text class="label-text" x="180" y="415">odrl:Policy</text><rect class="component-box color-cred" height="30" width="180" x="90" y="435" /><text class="label-text" x="180" y="455">foaf:Agent</text><rect class="layer-bg color-idsa" height="140" width="220" x="710" y="230" /><text class="label-header" x="820" y="255">IDSA ALIGNMENT</text><rect class="component-box color-idsa" height="30" width="180" x="730" y="275" /><text class="label-text" x="820" y="295">ids:DataResource</text><rect class="component-box color-idsa" height="30" width="18