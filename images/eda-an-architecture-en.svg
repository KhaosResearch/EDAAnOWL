<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900px" version="1.1" width="1000px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><style type="text/css"><![CDATA[
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        text { font-family: 'Inter', sans-serif; fill: #2d3436; }
        .layer-bg { rx: 15; ry: 15; stroke-width: 2; fill-opacity: 0.05; }
        .component-box { rx: 8; ry: 8; stroke-width: 1.5; fill: #ffffff; }
        
        .label-title { font-size: 20px; font-weight: 600; text-anchor: middle; fill: #2d3436; text-transform: uppercase; letter-spacing: 1px; }
        .label-header { font-size: 16px; font-weight: 600; text-anchor: middle; }
        .label-text { font-size: 13px; text-anchor: middle; }
        .label-italic { font-size: 12px; font-style: italic; opacity: 0.7; text-anchor: middle; }
        
        /* Professional Palette */
        .color-ds { fill: #0984e3; stroke: #0984e3; }      /* Blue - Physical World */
        .color-cred { fill: #6c5ce7; stroke: #6c5ce7; }    /* Purple - Compliance */
        .color-edaan { fill: #00b894; stroke: #00b894; }   /* Green - Core Logic */
        .color-idsa { fill: #d63031; stroke: #d63031; }    /* Red - Standard */
        .color-bigowl { fill: #e67e22; stroke: #d35400; }  /* Orange - Workflow */
        
        .arrow { stroke: #636e72; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        .arrow-dashed { stroke-dasharray: 8,5; }
        .arrow-label { font-size: 11px; font-weight: 600; fill: #636e72; }
    ]]></style><marker id="arrowhead" markerHeight="4" markerWidth="4" orient="auto" refX="10" refY="5"><path d="M0,0 L10,5 L0,10 Z" fill="#636e72" /></marker></defs><rect class="layer-bg color-ds" height="120" width="900" x="50" y="40" /><text class="label-title" x="500" y="70">Data Space (Physical Assets)</text><rect class="component-box color-ds" height="45" width="250" x="120" y="95" /><text class="label-header" x="245" y="123">Data Assets &amp; Files</text><rect class="component-box color-ds" height="45" width="250" x="630" y="95" /><text class="label-header" x="755" y="123">Algorithms &amp; App Services</text><rect class="layer-bg" fill="#fdfdfd" height="480" stroke="#b2bec3" width="900" x="50" y="220" /><text class="label-title" x="500" y="245">Semantic Interoperability (Ontology)</text><rect class="layer-bg color-cred" height="240" width="220" x="70" y="280" /><text class="label-header color-cred" x="180" y="305">CRED Cataloging</text><rect class="component-box color-cred" height="32" width="180" x="90" y="325" /><text class="label-text" x="180" y="346">dcat:Catalog</text><rect class="component-box color-cred" height="32" width="180" x="90" y="365" /><text class="label-text" x="180" y="386">dcat:Dataset</text><rect class="component-box color-cred" height="32" width="180" x="90" y="405" /><text class="label-text" x="180" y="426">dcat:DataService</text><rect class="component-box color-cred" height="32" width="180" x="90" y="445" /><text class="label-text" x="180" y="466">odrl:Offer / Policy</text><rect class="component-box color-cred" height="32" width="180" x="90" y="485" /><text class="label-text" x="180" y="506">foaf:Agent</text><rect class="layer-bg color-idsa" height="120" width="220" x="710" y="280" /><text class="label-header color-idsa" x="820" y="305">IDSA Standards</text><rect class="component-box color-idsa" height="35" width="180" x="730" y="325" /><text class="label-text" x="820" y="348">ids:DataResource</text><rect class="component-box color-idsa" height="35" width="180" x="730" y="365" /><text class="label-text" x="820" y="388">ids:DataApp</text><rect class="layer-bg color-edaan" height="400" width="380" x="310" y="280" /><text class="label-header color-edaan" x="500" y="305">EDAAnOWL v1.0.0 Core</text><rect class="component-box color-edaan" height="50" width="160" x="330" y="325" /><text class="label-header" x="410" y="348">DataAsset</text><text class="label-italic" x="410" y="365">(Supply Side)</text><rect class="component-box color-edaan" height="50" width="160" x="510" y="325" /><text class="label-header" x="590" y="348">SmartDataApp</text><text class="label-italic" x="590" y="365">(Demand Side)</text><rect class="layer-bg color-edaan" height="160" style="fill-opacity: 0.1; stroke-dasharray: 4,4;" width="340" x="330" y="400" /><text class="label-italic" x="500" y="420">v1.0.0 MATCHMAKING</text><rect class="component-box color-edaan" height="35" width="300" x="350" y="430" /><text class="label-header" x="500" y="453">DataSpecification (Atomic Meaning)</text><rect class="component-box color-edaan" height="35" width="140" x="350" y="475" /><text class="label-text" x="420" y="498">FieldMapping</text><rect class="component-box color-edaan" height="35" width="140" x="350" y="515" /><text class="label-text" x="420" y="538">Metric / Unit</text><rect class="component-box color-edaan" height="35" width="140" x="510" y="475" /><text class="label-text" x="580" y="498">InputProfile</text><rect class="component-box color-edaan" height="35" width="140" x="510" y="515" /><text class="label-text" x="580" y="538">DataConstraint</text><rect class="component-box color-edaan" height="80" style="fill:#f0fbf0; stroke-dasharray: 2,2;" width="340" x="330" y="580" /><text class="label-header" x="500" y="605">SOSA/QUDT Semantic Anchoring</text><text class="label-text" x="500" y="630">ObservableProperty / FeatureOfInterest / Unit</text><text class="label-italic" x="500" y="650">(Domain Interoperability)</text><rect class="layer-bg color-bigowl" height="140" width="220" x="710" y="580" /><text class="label-header color-bigowl" x="820" y="605">BIGOWL Workflows</text><rect class="component-box color-bigowl" height="32" width="180" x="730" y="630" /><text class="label-text" x="820" y="651">bigwf:Workflow</text><rect class="component-box color-bigowl" height="32" width="180" x="730" y="670" /><text class="label-text" x="820" y="691">bigwf:Component</text><line class="arrow" x1="245" x2="245" y1="140" y2="280" /><text class="arrow-label" x="215" y="210">Describe</text><line class="arrow" x1="755" x2="755" y1="140" y2="280" /><text class="arrow-label" x="725" y="210">Describe</text><line class="arrow" x1="410" x2="410" y1="375" y2="475" /><text class="arrow-label" x="365" y="415">mapped via</text><line class="arrow" x1="590" x2="590" y1="375" y2="475" /><text class="arrow-label" x="625" y="415">requires</text><line class="arrow" x1="420" x2="450" y1="475" y2="435" /><line class="arrow" x1="580" x2="550" y1="475" y2="435" /><line class="arrow arrow-dashed" x1="500" x2="500" y1="435" y2="580" /><line class="arrow arrow-dashed" x1="290" x2="330" y1="348" y2="348" /><line class="arrow" x1="710" x2="490" y1="348" y2="348" /><line class="arrow" x1="670" x2="710" y1="388" y2="388" /><line class="arrow" x1="820" x2="820" y1="400" y2="580" /></svg>